<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRIS Payment - Ghanz625</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .prefix {
            position: absolute;
            left: 15px;
            color: #666;
            font-weight: 500;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px;
            padding-left: 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-outline:hover:not(:disabled) {
            background: #f8f9ff;
            transform: translateY(-2px);
        }

        .btn-sm {
            padding: 10px 20px;
            font-size: 14px;
        }

        .qris-container {
            text-align: center;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 15px;
            margin: 20px 0;
        }

        .qris-container img {
            max-width: 250px;
            width: 100%;
            height: auto;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .amount-info {
            background: #e8f5e9;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }

        .amount-info .total {
            font-size: 32px;
            font-weight: bold;
            color: #2e7d32;
            margin: 5px 0;
        }

        .amount-info .unique-code {
            background: #ffd54f;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
        }

        .transaction-details {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 14px;
        }

        .transaction-details p {
            margin: 5px 0;
            color: #666;
        }

        .transaction-details .id {
            font-family: monospace;
            font-size: 12px;
            color: #333;
            word-break: break-all;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fff3e0;
            color: #e65100;
        }

        .status-success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-expired {
            background: #ffebee;
            color: #c62828;
        }

        .status-cancelled {
            background: #ffebee;
            color: #c62828;
        }

        .timer {
            font-size: 20px;
            font-weight: bold;
            color: #f44336;
            margin: 10px 0;
            text-align: center;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .alert-info {
            background: #e3f2fd;
            color: #0d47a1;
            border: 1px solid #90caf9;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group .btn {
            flex: 1;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .merchant-name {
            font-weight: bold;
            color: #667eea;
        }

        .quick-amount {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .quick-amount button {
            padding: 10px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quick-amount button:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <h1>💰 QRIS Payment</h1>
            <p>Bayar dengan scan QRIS - <span class="merchant-name">Ghanz625</span></p>
        </div>

        <div class="content">
            <!-- Form Input -->
            <div id="formSection">
                <div class="form-group">
                    <label>Masukkan Nominal (Min. Rp 2.000 - Max Rp 10.000.000)</label>
                    <div class="input-wrapper">
                        <span class="prefix">Rp</span>
                        <input type="number" id="amount" placeholder="20000" min="2000" max="10000000" step="1000">
                    </div>
                </div>

                <!-- Quick Amount Buttons -->
                <div class="quick-amount">
                    <button onclick="setAmount(20000)">Rp 20rb</button>
                    <button onclick="setAmount(50000)">Rp 50rb</button>
                    <button onclick="setAmount(100000)">Rp 100rb</button>
                    <button onclick="setAmount(250000)">Rp 250rb</button>
                    <button onclick="setAmount(500000)">Rp 500rb</button>
                    <button onclick="setAmount(1000000)">Rp 1jt</button>
                </div>

                <button class="btn" id="generateBtn" onclick="generateQRIS()">
                    Generate QRIS
                </button>
                <div class="info-text">*Kode unik 100-999 akan ditambahkan otomatis</div>
            </div>

            <!-- Loading -->
            <div id="loadingSection" class="hidden" style="text-align: center; padding: 40px;">
                <div class="loading" style="width: 40px; height: 40px;"></div>
                <p style="margin-top: 15px; color: #666;">Memproses...</p>
            </div>

            <!-- QRIS Display -->
            <div id="qrisSection" class="hidden">
                <div class="amount-info">
                    <small>Total Pembayaran</small>
                    <div class="total" id="totalAmount">Rp 0</div>
                    <div class="unique-code" id="uniqueCode"></div>
                </div>

                <div class="qris-container">
                    <p style="margin-bottom: 10px; color: #666;">Scan QRIS ini:</p>
                    <img id="qrisImage" src="" alt="QRIS Code">
                </div>

                <div class="transaction-details">
                    <p><strong>ID Transaksi:</strong></p>
                    <p class="id" id="transactionId">-</p>
                    <p><strong>Merchant:</strong> <span id="merchant">Ghanz625</span></p>
                    <p><strong>Status:</strong> <span class="status-badge status-pending" id="status">PENDING</span></p>
                    <p><strong>Dibuat:</strong> <span id="createdAt">-</span></p>
                    <p><strong>Expired:</strong> <span id="expiryTime">-</span></p>
                </div>

                <div class="timer" id="timer"></div>

                <div class="alert" id="alert"></div>

                <div class="button-group">
                    <button class="btn btn-outline" onclick="cancelTransaction()" id="cancelBtn">
                        Batal
                    </button>
                    <button class="btn" onclick="newTransaction()">
                        Baru
                    </button>
                </div>

                <!-- Testing Section (hanya muncul jika ada parameter test) -->
                <div id="testingSection" class="hidden" style="margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 10px;">
                    <p style="font-weight: bold; margin-bottom: 10px;">🧪 Mode Testing</p>
                    <button class="btn btn-sm" onclick="simulatePayment()" style="background: #4caf50;">Simulasi Bayar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://157.230.255.221:2003';
        let currentTransaction = null;
        let statusInterval = null;
        let timerInterval = null;

        // Check if in test mode
        const urlParams = new URLSearchParams(window.location.search);
        const isTestMode = urlParams.get('test') === '1';

        // Set amount from quick buttons
        function setAmount(amount) {
            document.getElementById('amount').value = amount;
        }

        // Generate QRIS
        async function generateQRIS() {
            const amount = document.getElementById('amount').value;
            
            if (!amount) {
                showAlert('Masukkan nominal pembayaran', 'error');
                return;
            }

            const nominal = parseInt(amount);
            
            if (nominal < 2000) {
                showAlert('Minimal pembayaran Rp 2.000', 'error');
                return;
            }

            if (nominal > 10000000) {
                showAlert('Maksimal pembayaran Rp 10.000.000', 'error');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch(`${API_URL}/api/qris/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ amount: nominal })
                });

                const result = await response.json();

                if (result.success) {
                    currentTransaction = result.data;
                    displayQRIS(result.data);
                    startStatusCheck(result.data.transactionId);
                    
                    // Show testing section if in test mode
                    if (isTestMode) {
                        document.getElementById('testingSection').classList.remove('hidden');
                    }
                } else {
                    showAlert(result.message, 'error');
                    showLoading(false);
                }
            } catch (error) {
                showAlert('Gagal terhubung ke server', 'error');
                console.error('Error:', error);
                showLoading(false);
            }
        }

        // Display QRIS
        function displayQRIS(data) {
            document.getElementById('formSection').classList.add('hidden');
            document.getElementById('loadingSection').classList.add('hidden');
            document.getElementById('qrisSection').classList.remove('hidden');

            document.getElementById('totalAmount').textContent = data.totalFormatted || data.amountFormatted;
            document.getElementById('uniqueCode').textContent = `Kode Unik: +Rp ${data.uniqueCode}`;
            document.getElementById('qrisImage').src = data.qrImage;
            document.getElementById('transactionId').textContent = data.transactionId;
            document.getElementById('status').textContent = data.status;
            
            const createdAt = new Date(data.expiresAt);
            createdAt.setMinutes(createdAt.getMinutes() - 4); // Kurangi 4 menit untuk dapat created at
            document.getElementById('createdAt').textContent = createdAt.toLocaleString('id-ID');
            
            const expiryDate = new Date(data.expiresAt);
            document.getElementById('expiryTime').textContent = expiryDate.toLocaleString('id-ID');

            startTimer(expiryDate);
        }

        // Timer
        function startTimer(expiryDate) {
            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                const now = new Date().getTime();
                const expiry = expiryDate.getTime();
                const distance = expiry - now;

                if (distance < 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer').textContent = '⏰ Waktu habis!';
                    document.getElementById('status').textContent = 'EXPIRED';
                    document.getElementById('status').className = 'status-badge status-expired';
                } else {
                    const minutes = Math.floor(distance / (1000 * 60));
                    const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                    document.getElementById('timer').textContent = 
                        `⏰ Sisa waktu: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        // Check status
        function startStatusCheck(transactionId) {
            if (statusInterval) clearInterval(statusInterval);

            statusInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${API_URL}/api/qris/status/${transactionId}`);
                    const result = await response.json();

                    if (result.success) {
                        const status = result.data.status;
                        document.getElementById('status').textContent = status;
                        
                        if (status === 'SUCCESS') {
                            document.getElementById('status').className = 'status-badge status-success';
                            showAlert('✅ Pembayaran berhasil! Terima kasih', 'success');
                            clearInterval(statusInterval);
                            clearInterval(timerInterval);
                            document.getElementById('cancelBtn').disabled = true;
                        } else if (status === 'EXPIRED') {
                            document.getElementById('status').className = 'status-badge status-expired';
                            showAlert('⏰ Waktu pembayaran habis', 'error');
                            clearInterval(statusInterval);
                            document.getElementById('cancelBtn').disabled = true;
                        } else if (status === 'CANCELLED') {
                            document.getElementById('status').className = 'status-badge status-cancelled';
                            clearInterval(statusInterval);
                            clearInterval(timerInterval);
                            document.getElementById('cancelBtn').disabled = true;
                        }
                    }
                } catch (error) {
                    console.error('Status check error:', error);
                }
            }, 3000);
        }

        // Cancel transaction
        async function cancelTransaction() {
            if (!currentTransaction) return;

            if (!confirm('Yakin ingin membatalkan transaksi ini?')) return;

            try {
                const response = await fetch(`${API_URL}/api/qris/cancel/${currentTransaction.transactionId}`, {
                    method: 'POST'
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('✅ Transaksi dibatalkan', 'success');
                    document.getElementById('status').textContent = 'CANCELLED';
                    document.getElementById('status').className = 'status-badge status-cancelled';
                    clearInterval(statusInterval);
                    clearInterval(timerInterval);
                    document.getElementById('cancelBtn').disabled = true;
                } else {
                    showAlert(result.message, 'error');
                }
            } catch (error) {
                showAlert('Gagal membatalkan transaksi', 'error');
            }
        }

        // Simulate payment (for testing)
        async function simulatePayment() {
            if (!currentTransaction) return;

            try {
                const response = await fetch(`${API_URL}/api/qris/pay/${currentTransaction.transactionId}`, {
                    method: 'POST'
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('✅ Simulasi pembayaran berhasil', 'success');
                } else {
                    showAlert(result.message, 'error');
                }
            } catch (error) {
                showAlert('Gagal simulasi pembayaran', 'error');
            }
        }

        // New transaction
        function newTransaction() {
            if (statusInterval) clearInterval(statusInterval);
            if (timerInterval) clearInterval(timerInterval);
            
            currentTransaction = null;
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('qrisSection').classList.add('hidden');
            document.getElementById('loadingSection').classList.add('hidden');
            document.getElementById('testingSection').classList.add('hidden');
            document.getElementById('amount').value = '';
            document.getElementById('cancelBtn').disabled = false;
        }

        // Show loading
        function showLoading(show) {
            if (show) {
                document.getElementById('formSection').classList.add('hidden');
                document.getElementById('loadingSection').classList.remove('hidden');
                document.getElementById('qrisSection').classList.add('hidden');
            } else {
                document.getElementById('loadingSection').classList.add('hidden');
                document.getElementById('formSection').classList.remove('hidden');
            }
        }

        // Show alert
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';

            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }

        // Check health on load
        async function checkHealth() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                if (data.success) {
                    console.log('✅ Server connected:', data.message);
                }
            } catch (error) {
                showAlert('⚠️ Tidak dapat terhubung ke server', 'error');
                console.error('Connection error:', error);
            }
        }

        // Initialize
        checkHealth();

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (statusInterval) clearInterval(statusInterval);
            if (timerInterval) clearInterval(timerInterval);
        });

        // Enter key to generate
        document.getElementById('amount').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateQRIS();
            }
        });
    </script>
</body>
</html>
