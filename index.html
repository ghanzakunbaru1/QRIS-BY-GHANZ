<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRIS Payment - Ghanz625</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .prefix {
            position: absolute;
            left: 15px;
            color: #666;
            font-weight: 500;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px;
            padding-left: 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .qris-container {
            text-align: center;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 15px;
            margin: 20px 0;
        }

        .qris-container img {
            max-width: 250px;
            width: 100%;
            height: auto;
            margin: 10px 0;
            border-radius: 10px;
        }

        .amount-info {
            background: #e8f5e9;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }

        .amount-info .total {
            font-size: 32px;
            font-weight: bold;
            color: #2e7d32;
            margin: 5px 0;
        }

        .amount-info .unique-code {
            background: #ffd54f;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }

        .transaction-details {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 12px;
        }

        .status-pending {
            background: #fff3e0;
            color: #e65100;
        }

        .status-success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .timer {
            font-size: 20px;
            font-weight: bold;
            color: #f44336;
            margin: 10px 0;
            text-align: center;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group .btn {
            flex: 1;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .debug-box {
            background: #000;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 10px;
            max-height: 200px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 QRIS Payment</h1>
            <p>Bayar dengan scan QRIS - Ghanz625</p>
        </div>

        <div class="content">
            <!-- Form Input -->
            <div id="formSection">
                <div class="form-group">
                    <label>Masukkan Nominal (Min. Rp 2.000)</label>
                    <div class="input-wrapper">
                        <span class="prefix">Rp</span>
                        <input type="number" id="amount" placeholder="20000" min="2000" value="20000">
                    </div>
                </div>
                <button class="btn" id="generateBtn" onclick="generateQRIS()">
                    Generate QRIS
                </button>
            </div>

            <!-- Loading -->
            <div id="loadingSection" class="hidden" style="text-align: center; padding: 40px;">
                <div class="loading" style="width: 40px; height: 40px;"></div>
                <p style="margin-top: 15px;">Memproses...</p>
            </div>

            <!-- QRIS Display -->
            <div id="qrisSection" class="hidden">
                <div class="amount-info">
                    <small>Total Pembayaran</small>
                    <div class="total" id="totalAmount">Rp 0</div>
                    <div class="unique-code" id="uniqueCode"></div>
                </div>

                <div class="qris-container">
                    <img id="qrisImage" src="" alt="QRIS Code">
                </div>

                <div class="transaction-details">
                    <p><strong>ID:</strong> <span id="transactionId">-</span></p>
                    <p><strong>Status:</strong> <span class="status-badge status-pending" id="status">PENDING</span></p>
                    <p><strong>Expired:</strong> <span id="expiryTime">-</span></p>
                </div>

                <div class="timer" id="timer"></div>
                
                <!-- Debug Box -->
                <div class="debug-box" id="debugBox"></div>

                <div class="alert" id="alert"></div>

                <div class="button-group">
                    <button class="btn btn-outline" onclick="cancelTransaction()" id="cancelBtn">
                        Batal
                    </button>
                    <button class="btn" onclick="newTransaction()">
                        Baru
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Ganti dengan IP VPS kamu
        const API_URL = 'http://157.230.255.221:2003';
        let currentTransaction = null;
        let statusInterval = null;
        let timerInterval = null;

        // Debug function
        function debug(message, data = null) {
            const debugBox = document.getElementById('debugBox');
            const timestamp = new Date().toLocaleTimeString();
            let logMessage = `[${timestamp}] ${message}`;
            
            if (data) {
                if (typeof data === 'object') {
                    logMessage += `\n${JSON.stringify(data, null, 2)}`;
                } else {
                    logMessage += `\n${data}`;
                }
            }
            
            debugBox.innerHTML += logMessage + '\n\n';
            debugBox.scrollTop = debugBox.scrollHeight;
            
            console.log(`[DEBUG] ${message}`, data);
        }

        // Generate QRIS
        async function generateQRIS() {
            const amount = document.getElementById('amount').value;
            
            debug('Generate QRIS clicked', { amount });

            if (!amount) {
                showAlert('Masukkan nominal', 'error');
                return;
            }

            const nominal = parseInt(amount);
            
            if (nominal < 2000) {
                showAlert('Minimal Rp 2.000', 'error');
                return;
            }

            showLoading(true);
            debug('Sending request to server...');

            try {
                const requestData = { amount: nominal };
                debug('Request data:', requestData);

                const response = await fetch(`${API_URL}/api/qris/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                debug('Response status:', response.status);
                
                const responseText = await response.text();
                debug('Raw response:', responseText);

                let result;
                try {
                    result = JSON.parse(responseText);
                    debug('Parsed response:', result);
                } catch (e) {
                    debug('Failed to parse JSON:', e.message);
                    showAlert('Server error: Invalid response', 'error');
                    showLoading(false);
                    return;
                }

                if (result.success) {
                    currentTransaction = result.data;
                    displayQRIS(result.data);
                    startStatusCheck(result.data.transactionId);
                    debug('QRIS generated successfully', result.data);
                } else {
                    showAlert(result.message || 'Gagal generate QRIS', 'error');
                    debug('Server returned error:', result);
                    showLoading(false);
                }
            } catch (error) {
                debug('Network/Connection error:', error.message);
                showAlert('Gagal terhubung ke server: ' + error.message, 'error');
                showLoading(false);
            }
        }

        // Display QRIS
        function displayQRIS(data) {
            document.getElementById('formSection').classList.add('hidden');
            document.getElementById('loadingSection').classList.add('hidden');
            document.getElementById('qrisSection').classList.remove('hidden');

            document.getElementById('totalAmount').textContent = data.totalFormatted || data.amountFormatted;
            document.getElementById('uniqueCode').textContent = `Kode Unik: +Rp ${data.uniqueCode}`;
            document.getElementById('qrisImage').src = data.qrImage;
            document.getElementById('transactionId').textContent = data.transactionId;
            document.getElementById('status').textContent = data.status;
            
            const expiryDate = new Date(data.expiresAt);
            document.getElementById('expiryTime').textContent = expiryDate.toLocaleTimeString('id-ID');

            startTimer(expiryDate);
        }

        // Timer
        function startTimer(expiryDate) {
            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                const now = new Date().getTime();
                const expiry = expiryDate.getTime();
                const distance = expiry - now;

                if (distance < 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer').textContent = 'Waktu habis!';
                } else {
                    const minutes = Math.floor(distance / (1000 * 60));
                    const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                    document.getElementById('timer').textContent = 
                        `⏰ Sisa: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        // Check status
        function startStatusCheck(transactionId) {
            if (statusInterval) clearInterval(statusInterval);

            statusInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${API_URL}/api/qris/status/${transactionId}`);
                    const result = await response.json();

                    if (result.success) {
                        const status = result.data.status;
                        document.getElementById('status').textContent = status;
                        
                        if (status === 'SUCCESS') {
                            document.getElementById('status').className = 'status-badge status-success';
                            showAlert('✅ Pembayaran berhasil!', 'success');
                            clearInterval(statusInterval);
                            clearInterval(timerInterval);
                        }
                    }
                } catch (error) {
                    console.error('Status check error:', error);
                }
            }, 3000);
        }

        // Cancel transaction
        async function cancelTransaction() {
            if (!currentTransaction) return;

            try {
                const response = await fetch(`${API_URL}/api/qris/cancel/${currentTransaction.transactionId}`, {
                    method: 'POST'
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Transaksi dibatalkan', 'success');
                    document.getElementById('status').textContent = 'CANCELLED';
                    clearInterval(statusInterval);
                    clearInterval(timerInterval);
                }
            } catch (error) {
                showAlert('Gagal membatalkan', 'error');
            }
        }

        // New transaction
        function newTransaction() {
            if (statusInterval) clearInterval(statusInterval);
            if (timerInterval) clearInterval(timerInterval);
            
            currentTransaction = null;
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('qrisSection').classList.add('hidden');
            document.getElementById('loadingSection').classList.add('hidden');
            document.getElementById('debugBox').innerHTML = ''; // Clear debug
        }

        // Show loading
        function showLoading(show) {
            if (show) {
                document.getElementById('formSection').classList.add('hidden');
                document.getElementById('loadingSection').classList.remove('hidden');
                document.getElementById('qrisSection').classList.add('hidden');
            } else {
                document.getElementById('loadingSection').classList.add('hidden');
                document.getElementById('formSection').classList.remove('hidden');
            }
        }

        // Show alert
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';

            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }

        // Test connection on load
        async function testConnection() {
            debug('Testing connection to server...');
            try {
                const response = await fetch(`${API_URL}/health`);
                const text = await response.text();
                debug('Health check response:', text);
            } catch (error) {
                debug('Health check failed:', error.message);
            }
        }

        // Run test on load
        testConnection();
    </script>
</body>
</html>
